<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kiko Sushi | نظام إدارة المطعم</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,500;0,600;0,700;1,500&family=Tajawal:wght@400;500;700;800&display=swap" rel="stylesheet">
<style>
  :root{
    --cream:#F4EADA;
    --cream-2:#EDE0C7;
    --paper:#FBF6EC;
    --green:#3E4A32;
    --green-dark:#2B3423;
    --green-soft:#5C6B49;
    --rose:#C4776B;
    --rose-2:#B5645A;
    --rose-light:#E9C3B9;
    --gold:#B08B4F;
    --ink:#38312A;
    --ink-soft:#6b6255;
    --line: rgba(62,74,50,.28);
    --ok:#4C7A4E;
    --warn:#B08B4F;
    --danger:#A2483D;
    --shadow: 0 10px 30px rgba(43,52,35,.10), 0 2px 6px rgba(43,52,35,.06);
    --radius: 14px;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background: var(--cream);
    background-image:
      radial-gradient(circle at 8% 10%, rgba(196,119,107,.08), transparent 40%),
      radial-gradient(circle at 95% 85%, rgba(62,74,50,.08), transparent 45%);
    background-attachment: fixed;
    color: var(--ink);
    font-family:'Tajawal', sans-serif;
    min-height:100vh;
  }
  .brand-font{ font-family:'Cormorant Garamond', serif; }
  a{ color:inherit; text-decoration:none; }
  button{ font-family:inherit; cursor:pointer; }
  ::selection{ background: var(--rose-light); }

  /* ---------- Scaffolding ---------- */
  #app{ min-height:100vh; display:flex; flex-direction:column; }

  .topbar{
    background: linear-gradient(180deg, var(--paper), var(--cream-2));
    border-bottom: 1px solid var(--line);
    position: sticky; top:0; z-index: 40;
  }
  .topbar-inner{
    max-width: 1180px; margin:0 auto; padding: 10px 20px;
    display:flex; align-items:center; gap:14px; flex-wrap:wrap;
  }
  .brand{ display:flex; align-items:center; gap:10px; }
  .brand img{ width:46px; height:46px; border-radius:50%; object-fit:cover; box-shadow: var(--shadow); border: 2px solid var(--paper); }
  .brand-text .en{ font-family:'Cormorant Garamond', serif; font-weight:700; font-size:22px; color:var(--green-dark); line-height:1; letter-spacing:.5px; }
  .brand-text .ar{ font-size:11px; color:var(--rose-2); letter-spacing:3px; }

  .tabs{ display:flex; gap:6px; margin-inline-start:auto; flex-wrap:wrap; }
  .tab-btn{
    background:transparent; border:1px solid transparent; color:var(--green-dark);
    padding:9px 16px; border-radius:999px; font-weight:700; font-size:14.5px;
    transition:.15s;
  }
  .tab-btn:hover{ background: rgba(62,74,50,.08); }
  .tab-btn.active{ background: var(--green); color:var(--paper); box-shadow: var(--shadow); }

  .btn{
    border:1px solid var(--line); background:var(--paper); color:var(--green-dark);
    padding:9px 16px; border-radius:10px; font-weight:700; font-size:14px; display:inline-flex; align-items:center; gap:6px;
    transition:.15s;
  }
  .btn:hover{ border-color: var(--green-soft); transform: translateY(-1px); }
  .btn-primary{ background: var(--green); color:var(--paper); border-color:var(--green); }
  .btn-primary:hover{ background: var(--green-dark); }
  .btn-rose{ background: var(--rose); color:var(--paper); border-color:var(--rose); }
  .btn-rose:hover{ background: var(--rose-2); }
  .btn-ghost{ background:transparent; border-color:transparent; }
  .btn-danger{ background:transparent; color:var(--danger); border-color: rgba(162,72,61,.35); }
  .btn-danger:hover{ background: rgba(162,72,61,.08); }
  .btn-sm{ padding:6px 11px; font-size:12.5px; border-radius:8px; }
  .btn:disabled{ opacity:.45; cursor:not-allowed; transform:none; }

  main{ flex:1; max-width:1180px; margin:0 auto; padding: 26px 20px 60px; width:100%; }

  /* section header */
  .section-head{ display:flex; align-items:flex-end; justify-content:space-between; gap:14px; margin-bottom:18px; flex-wrap:wrap; }
  .section-head h1{ font-family:'Cormorant Garamond',serif; font-size:30px; color:var(--green-dark); margin:0 0 2px; }
  .section-head p{ margin:0; color:var(--ink-soft); font-size:13.5px; }
  .divider{ display:flex; align-items:center; gap:10px; margin: 22px 0 16px; color: var(--rose-2); }
  .divider .line{ flex:1; height:1px; background: var(--line); }

  .card{ background: var(--paper); border:1px solid var(--line); border-radius: var(--radius); box-shadow: var(--shadow); }
  .grid{ display:grid; gap:14px; }
  .grid-3{ grid-template-columns: repeat(3, 1fr); }
  .grid-2{ grid-template-columns: repeat(2, 1fr); }
  @media (max-width: 900px){ .grid-3{ grid-template-columns: repeat(2,1fr); } }
  @media (max-width: 640px){ .grid-3, .grid-2{ grid-template-columns: 1fr; } }

  /* ---------- Ingredients ---------- */
  .ing-card{ padding:16px; display:flex; flex-direction:column; gap:8px; position:relative; }
  .ing-card .name{ font-weight:800; font-size:16px; color:var(--green-dark); }
  .ing-card .qty-row{ display:flex; align-items:baseline; gap:6px; }
  .ing-card .qty{ font-size:26px; font-weight:800; font-family:'Cormorant Garamond',serif; color:var(--ink); }
  .ing-card .unit{ color:var(--ink-soft); font-size:13px; }
  .stock-bar{ height:6px; border-radius:6px; background: rgba(62,74,50,.12); overflow:hidden; }
  .stock-bar > div{ height:100%; border-radius:6px; background: var(--ok); }
  .stock-bar.low > div{ background: var(--warn); }
  .stock-bar.critical > div{ background: var(--danger); }
  .ing-actions{ display:flex; gap:6px; margin-top:4px; }

  /* ---------- Products ---------- */
  .prod-card{ padding:16px; display:flex; flex-direction:column; gap:10px; }
  .prod-card .top{ display:flex; justify-content:space-between; gap:10px; align-items:flex-start; }
  .prod-card .name{ font-weight:800; color:var(--green-dark); font-size:16.5px; }
  .prod-card .tags{ display:flex; gap:6px; margin-top:4px; flex-wrap:wrap; }
  .tag{ font-size:11px; padding:3px 9px; border-radius:999px; background: rgba(62,74,50,.10); color:var(--green-dark); font-weight:700; }
  .tag.rose{ background: rgba(196,119,107,.16); color:var(--rose-2); }
  .prod-card .price{ font-family:'Cormorant Garamond',serif; font-weight:700; font-size:24px; color:var(--rose-2); white-space:nowrap; }
  .avail{ display:flex; align-items:center; justify-content:space-between; background: rgba(62,74,50,.06); border-radius:10px; padding:8px 12px; font-size:13px; }
  .avail b{ color:var(--green-dark); font-size:16px; }
  .avail.zero b{ color: var(--danger); }
  .prod-actions{ display:flex; gap:6px; }

  /* ---------- Orders ---------- */
  .order-card{ padding:16px; display:flex; flex-direction:column; gap:10px; }
  .order-card .top{ display:flex; justify-content:space-between; align-items:flex-start; gap:10px; flex-wrap:wrap; }
  .order-id{ font-family:'Cormorant Garamond',serif; font-weight:700; font-size:19px; color:var(--green-dark); }
  .order-meta{ font-size:12.5px; color:var(--ink-soft); }
  .src-badge{ font-size:11px; padding:3px 10px; border-radius:999px; font-weight:800; }
  .src-badge.phone{ background: rgba(62,74,50,.12); color:var(--green-dark); }
  .src-badge.link{ background: rgba(196,119,107,.16); color:var(--rose-2); }
  .order-items{ font-size:13.5px; color:var(--ink); background: rgba(62,74,50,.05); border-radius:10px; padding:10px 12px; }
  .order-items div{ display:flex; justify-content:space-between; padding:2px 0; }
  .order-total{ display:flex; justify-content:space-between; font-weight:800; color:var(--green-dark); border-top:1px dashed var(--line); margin-top:6px; padding-top:6px; }
  .status-pill{ font-size:12.5px; font-weight:800; padding:6px 14px; border-radius:999px; display:inline-flex; align-items:center; gap:6px; }
  .status-pill.received{ background: rgba(176,139,79,.18); color:#8a6a30; }
  .status-pill.preparing{ background: rgba(196,119,107,.18); color:var(--rose-2); }
  .status-pill.ready{ background: rgba(76,122,78,.18); color:var(--ok); }
  .status-pill.cancelled{ background: rgba(162,72,61,.14); color:var(--danger); }
  .status-steps{ display:flex; gap:6px; }
  .status-steps button{ flex:1; }
  .order-foot{ display:flex; justify-content:space-between; align-items:center; gap:8px; }

  .empty{ text-align:center; padding:50px 20px; color:var(--ink-soft); }
  .empty .icon{ font-size:34px; margin-bottom:8px; }

  /* ---------- Modal ---------- */
  .overlay{ position:fixed; inset:0; background: rgba(43,52,35,.45); backdrop-filter: blur(2px); display:flex; align-items:center; justify-content:center; z-index:100; padding:20px; }
  .modal{ background: var(--paper); border-radius: 16px; width:100%; max-width:520px; max-height:88vh; overflow:auto; box-shadow: 0 20px 60px rgba(0,0,0,.25); border:1px solid var(--line); }
  .modal-head{ display:flex; justify-content:space-between; align-items:center; padding:16px 20px; border-bottom:1px solid var(--line); position:sticky; top:0; background:var(--paper); }
  .modal-head h3{ margin:0; font-family:'Cormorant Garamond',serif; font-size:21px; color:var(--green-dark); }
  .modal-body{ padding:18px 20px; display:flex; flex-direction:column; gap:14px; }
  .modal-foot{ padding:14px 20px 20px; display:flex; gap:8px; justify-content:flex-end; }
  .field label{ display:block; font-size:12.5px; font-weight:700; color:var(--green-dark); margin-bottom:5px; }
  .field input, .field select{
    width:100%; padding:9px 11px; border-radius:9px; border:1px solid var(--line); background:#fff;
    font-family:inherit; font-size:14px; color:var(--ink);
  }
  .field input:focus, .field select:focus{ outline:2px solid var(--rose-light); border-color:var(--rose); }
  .field-row{ display:flex; gap:10px; }
  .field-row > *{ flex:1; }
  .recipe-row{ display:flex; gap:8px; align-items:center; }
  .recipe-row select{ flex:2; } .recipe-row input{ flex:1; }
  .close-x{ background:transparent; border:none; font-size:20px; color:var(--ink-soft); }

  .toast{ position:fixed; bottom:22px; left:50%; transform:translateX(-50%); background: var(--green-dark); color:var(--paper); padding:11px 22px; border-radius:999px; font-size:13.5px; font-weight:700; box-shadow: var(--shadow); z-index:200; opacity:0; pointer-events:none; transition:.25s; }
  .toast.show{ opacity:1; transform:translateX(-50%) translateY(-4px); }

  /* ---------- Decorative ---------- */
  .frame{ border:1.5px solid var(--green); border-radius:16px; position:relative; padding:2px; }
  .frame::before{ content:""; position:absolute; inset:6px; border:1px solid rgba(62,74,50,.4); border-radius:12px; pointer-events:none; }
  .corner{ position:absolute; width:26px; height:26px; opacity:.55; }
  .corner svg{ width:100%; height:100%; }
  .c-tl{ top:8px; inset-inline-start:8px; }
  .c-tr{ top:8px; inset-inline-end:8px; transform:scaleX(-1); }

  /* ---------- Customer page ---------- */
  .hero{ text-align:center; padding: 34px 16px 22px; position:relative; }
  .hero-badge{ width:92px; height:92px; border-radius:50%; margin:0 auto 14px; box-shadow: var(--shadow); border:3px solid var(--paper); }
  .hero h1{ font-family:'Cormorant Garamond',serif; font-size:40px; color:var(--green-dark); margin:0; letter-spacing:1px; }
  .hero .jp{ color:var(--rose-2); font-size:13px; letter-spacing:5px; margin-top:2px; }
  .hero p.tag{ display:inline-block; background:none; color:var(--green-soft); font-size:13px; margin-top:10px; letter-spacing:1px; }

  .menu-item{ padding:16px; display:flex; flex-direction:column; gap:10px; }
  .menu-item .name{ font-weight:800; color:var(--green-dark); font-size:17px; }
  .menu-item .desc{ font-size:12px; color:var(--ink-soft); }
  .seg{ display:flex; border:1px solid var(--line); border-radius:10px; overflow:hidden; }
  .seg button{ flex:1; background:var(--cream); border:none; padding:8px; font-size:13px; font-weight:700; color:var(--ink-soft); border-inline-start:1px solid var(--line); }
  .seg button:first-child{ border-inline-start:none; }
  .seg button.active{ background: var(--green); color:var(--paper); }
  .menu-item .price-row{ display:flex; justify-content:space-between; align-items:center; }
  .menu-item .price{ font-family:'Cormorant Garamond',serif; font-weight:700; font-size:22px; color:var(--rose-2); }
  .stepper{ display:flex; align-items:center; gap:10px; border:1px solid var(--line); border-radius:10px; padding:4px 6px; background:var(--cream); }
  .stepper button{ width:26px; height:26px; border-radius:7px; border:none; background:var(--paper); font-weight:800; color:var(--green-dark); font-size:16px; }
  .stepper span{ min-width:16px; text-align:center; font-weight:800; }
  .add-row{ display:flex; justify-content:space-between; align-items:center; }

  .cart-bar{ position:sticky; bottom:14px; margin-top:20px; }
  .cart-bar .card{ display:flex; align-items:center; justify-content:space-between; padding:14px 18px; gap:12px; flex-wrap:wrap; }
  .cart-bar .sum{ font-size:14px; }
  .cart-bar .sum b{ font-family:'Cormorant Garamond',serif; font-size:20px; color:var(--rose-2); }

  .track{ text-align:center; padding: 10px 10px 30px; }
  .track .order-num{ font-family:'Cormorant Garamond',serif; font-size:22px; color:var(--green-dark); }
  .steps3{ display:flex; align-items:center; justify-content:center; gap:6px; margin:26px auto; max-width:480px; }
  .step-node{ display:flex; flex-direction:column; align-items:center; gap:8px; flex:1; }
  .step-circle{ width:40px; height:40px; border-radius:50%; display:flex; align-items:center; justify-content:center; background:#fff; border:2px solid var(--line); color:var(--ink-soft); font-weight:800; }
  .step-node.done .step-circle{ background: var(--green); border-color:var(--green); color:#fff; }
  .step-node.current .step-circle{ background: var(--rose); border-color:var(--rose); color:#fff; animation: pulse 1.6s infinite; }
  .step-label{ font-size:12px; font-weight:700; color:var(--ink-soft); }
  .step-node.done .step-label, .step-node.current .step-label{ color:var(--green-dark); }
  .step-connector{ flex:1; height:2px; background:var(--line); margin-top:-24px; }
  .step-connector.done{ background: var(--green); }
  @keyframes pulse{ 0%{ box-shadow:0 0 0 0 rgba(196,119,107,.45);} 70%{ box-shadow:0 0 0 10px rgba(196,119,107,0);} 100%{ box-shadow:0 0 0 0 rgba(196,119,107,0);} }

  .footer-note{ text-align:center; color:var(--ink-soft); font-size:12px; padding: 20px; }
  .wave{ width:100%; height:26px; opacity:.5; margin-top:10px; }
  .admin-link{ text-align:center; margin-top:6px; }
  .admin-link a{ font-size:12px; color:var(--ink-soft); border-bottom:1px dotted var(--ink-soft); }

  .kbd-focus:focus-visible{ outline:3px solid var(--rose); outline-offset:2px; }
</style>
</head>

<div id="app"></div>
<div id="toast" class="toast"></div>

function normalizeData(d){
  if(!d) d = defaultData();
  if(!d.expenses) d.expenses = [];
  if(!d.units || !d.units.length) d.units = ["جم","كيلو","مل","حبة"];
  else if(!d.units.includes("كيلو")) d.units.push("كيلو");
  return d;
}

// اشتراك مباشر (Real-time): أي تغيير من أي جهاز/متصفح يصل هنا فورًا لكل من يفتح الصفحة
onSnapshot(STORE_DOC, (snap)=>{
  if(snap.exists()){
    DATA = normalizeData(snap.data());
  } else {
    DATA = defaultData();
    setDoc(STORE_DOC, DATA).catch(err=> console.error(err));
  }
  fbReady = true;
  render();
}, (err)=>{

/* ---------------- availability calc ---------------- */
function ingredientMap(){
  const m = {};
  DATA.ingredients.forEach(i=> m[i.id] = i);
  return m;
}
function availableCount(product){
  if(!product.recipe || product.recipe.length===0) return null;
  const m = ingredientMap();
  let min = Infinity;
  product.recipe.forEach(r=>{
    const ing = m[r.ingredientId];
    if(!ing || r.qty<=0) return;
    min = Math.min(min, Math.floor(ing.qty / r.qty));
  });
  return isFinite(min) ? Math.max(0,min) : null;
}
function deductForOrder(items){
  // items: [{productId, qty}]
  const m = ingredientMap();
  items.forEach(it=>{
    const p = DATA.products.find(p=>p.id===it.productId);
    if(!p) return;
    p.recipe.forEach(r=>{
      const ing = m[r.ingredientId];
      if(!ing) return;
      ing.qty = Math.max(0, ing.qty - r.qty*it.qty);
    });
  });
}
function restockForOrder(items){
  const m = ingredientMap();
  items.forEach(it=>{
    const p = DATA.products.find(p=>p.id===it.productId);
    if(!p) return;
    p.recipe.forEach(r=>{
      const ing = m[r.ingredientId];
      if(!ing) return;
      ing.qty = ing.qty + r.qty*it.qty;
    });
  });
}

/* ---------------- cost & profit calc ---------------- */
function computeRecipeCost(recipeArr){
  const m = ingredientMap();
  return (recipeArr||[]).reduce((s,r)=>{
    const ing = m[r.ingredientId];
    return s + (ing ? (ing.costPerUnit||0) * r.qty : 0);
  }, 0);
}
function costOfProduct(product){ return computeRecipeCost(product.recipe); }
function profitOfProduct(product){ return product.price - costOfProduct(product); }
function marginOfProduct(product){ const c=costOfProduct(product); return product.price>0 ? ((product.price-c)/product.price*100) : 0; }
function costOfOrderItems(items){
  return items.reduce((s,it)=>{
    const p = DATA.products.find(p=>p.id===it.productId);
    return s + (p ? costOfProduct(p)*it.qty : 0);
  }, 0);
}

function copyCustomerLink(){
  const isPreview = location.origin === "null" || location.href.startsWith("about:") || location.pathname.includes("srcdoc");
  if(isPreview){
    showToast("افتح الملف نفسه بمتصفح حقيقي (بعد تنزيله) عشان الرابط يشتغل صح — هذي معاينة مؤقتة فقط");
    return;
  }
  const url = location.origin + location.pathname + "#order";
  const done = ()=> showToast("تم نسخ الرابط ✓ (للتجربة على نفس الجهاز حاليًا — افتحه بتبويب ثاني)");
  if(navigator.clipboard && window.isSecureContext){
    navigator.clipboard.writeText(url).then(done).catch(()=> fallbackCopy(url, done));
  } else { fallbackCopy(url, done); }
}
function fallbackCopy(text, done){
  const ta = document.createElement("textarea");
  ta.value = text; document.body.appendChild(ta); ta.select();
  try{ document.execCommand("copy"); done(); }catch(e){ alert(text); }
  document.body.removeChild(ta);
}

/* ---- units of measurement CRUD ---- */
function openUnitsModal(){
  const list = DATA.units && DATA.units.length ? DATA.units : ["جم","كيلو","مل","حبة"];
  activeModal = { type:"units", draft: list.map(u=>({ from:u, to:u })) };
  render();
}
function addUnitRow(){ activeModal.draft.push({ from:null, to:"" }); render(); }
function removeUnitRow(idx){ activeModal.draft.splice(idx,1); render(); }
function updateUnitRow(idx, val){ activeModal.draft[idx].to = val; }
function saveUnitsForm(){
  const draft = activeModal.draft;
  const finalNames = draft.map(r=>r.to.trim()).filter(Boolean);
  if(!finalNames.length){ showToast("أضف وحدة واحدة على الأقل"); return; }
  if(new Set(finalNames).size !== finalNames.length){ showToast("توجد وحدة مكررة بنفس الاسم"); return; }
  // apply renames to ingredients referencing an edited unit
  draft.forEach(r=>{
    if(r.from && r.to && r.from!==r.to){
      DATA.ingredients.forEach(ing=>{ if(ing.unit===r.from) ing.unit = r.to; });
    }
  });
  // block removing a unit that's still used by an ingredient (row missing from draft = removed)
  const keptFrom = new Set(draft.filter(r=>r.from).map(r=>r.from));
  const removed = (DATA.units||[]).filter(u=>!keptFrom.has(u));
  const blocked = removed.filter(u=> DATA.ingredients.some(ing=>ing.unit===u));
  if(blocked.length){ showToast("لا يمكن حذف وحدة مستخدمة حاليًا: " + blocked.join("، ")); return; }
  DATA.units = finalNames;
  activeModal=null; saveData(DATA); showToast("تم حفظ وحدات القياس ✓");
}
function renderUnitsModal(){
  const rows = activeModal.draft.map((r,idx)=>`
    <div class="recipe-row">
      <input value="${r.to}" oninput="updateUnitRow(${idx}, this.value)" placeholder="اسم الوحدة">
      <button class="btn btn-sm btn-danger" onclick="removeUnitRow(${idx})">✕</button>
    </div>`).join("");
  return `
  <div class="overlay" onclick="if(event.target===this) closeModal()">
    <div class="modal">
      <div class="modal-head"><h3>وحدات القياس</h3><button class="close-x" onclick="closeModal()">✕</button></div>
      <div class="modal-body">
        <p style="font-size:12.5px;color:var(--ink-soft);margin:0">أضف أو عدّل أو احذف وحدات القياس المستخدمة بالمخزون (مثل جم، كيلو، مل، حبة)</p>
        <div style="display:flex;flex-direction:column;gap:8px">${rows}</div>
        <button class="btn btn-sm" style="margin-top:4px" onclick="addUnitRow()">+ إضافة وحدة</button>
      </div>
      <div class="modal-foot">
        <button class="btn" onclick="closeModal()">إلغاء</button>
        <button class="btn btn-primary" onclick="saveUnitsForm()">حفظ الوحدات</button>
      </div>
    </div>
  </div>`;
}

      <div>
        <h1>المراجعة المالية</h1>
        <p>ملخص ما بيع، تكلفته، ومصاريفك الإضافية — لمعرفة صافي ربحك الحقيقي</p>
      </div>
    </div>
    <div style="display:flex;gap:12px;flex-wrap:wrap;margin-bottom:10px">
      ${stat("المبيعات", revenue, "var(--green-dark)")}
      ${stat("تكلفة المكوّنات", ingCost, "var(--rose-2)")}
      ${stat("ربح الأصناف (قبل المصاريف)", grossProfit, grossProfit<0?"var(--danger)":"var(--ok)")}
      ${stat("المصاريف الإضافية", overhead, "var(--rose-2)")}
      ${stat("صافي الربح النهائي", netProfit, netProfit<0?"var(--danger)":"var(--ok)")}
    </div>

    <div class="divider"><span>الأصناف المباعة</span><div class="line"></div></div>
    ${rows ? `
      <div class="card" style="padding:14px 18px">
        <div style="display:grid;grid-template-columns:2fr 1fr 1fr 1fr 1fr;gap:8px;font-size:12px;color:var(--ink-soft);font-weight:800;padding-bottom:8px;border-bottom:1px solid var(--line)">
          <span>الصنف</span><span>الكمية</span><span>المبيعات</span><span>التكلفة</span><span>الربح</span>
        </div>
        ${rows}
      </div>` : emptyState('لا توجد مبيعات بعد','ستظهر هنا تفاصيل ما بعته من أصناف')}

    <div class="divider"><span>المصاريف الإضافية (إيجار، رواتب، تغليف...)</span><div class="line"></div></div>
    <p style="font-size:12px;color:var(--ink-soft);margin-top:-10px">أضفت لك مصاريف تقديرية مبدئية — عدّلها وأضف عليها ما يخصك</p>
    <div class="section-head" style="margin-bottom:10px">
      <div></div>
      <button class="btn btn-primary" onclick="openExpenseModal(null)">+ إضافة مصروف</button>
    </div>
    <div class="grid grid-3">${expenseRows || emptyState('لا توجد مصاريف مسجّلة','أضف أول مصروف إضافي')}</div>
  `;
}
function openExpenseModal(id){ activeModal = { type:"expense", id }; render(); }
function deleteExpense(id){
  if(!confirm("حذف هذا المصروف؟")) return;
  DATA.expenses = DATA.expenses.filter(e=>e.id!==id);
  saveData(DATA); showToast("تم حذف المصروف");
}
function saveExpenseForm(id){
  const name = document.getElementById("exp-name").value.trim();
  const amount = parseFloat(document.getElementById("exp-amount").value)||0;
  const note = document.getElementById("exp-note").value.trim();
  if(!name){ showToast("اكتب اسم المصروف"); return; }
  if(id){
    const e = DATA.expenses.find(e=>e.id===id);
    e.name=name; e.amount=amount; e.note=note;
  } else {
    DATA.expenses.push({ id:uid("exp"), name, amount, note, createdAt: Date.now() });
  }
  activeModal=null; saveData(DATA); showToast("تم الحفظ ✓");
}
function renderExpenseModal(){
  const e = activeModal.id ? DATA.expenses.find(x=>x.id===activeModal.id) : null;
  return `
  <div class="overlay" onclick="if(event.target===this) closeModal()">
    <div class="modal">
      <div class="modal-head"><h3>${e?"تعديل مصروف":"إضافة مصروف جديد"}</h3><button class="close-x" onclick="closeModal()">✕</button></div>
      <div class="modal-body">
        <div class="field"><label>اسم المصروف</label><input id="exp-name" value="${e?e.name:''}" placeholder="مثال: إيجار المحل"></div>
        <div class="field"><label>المبلغ (ر.س)</label><input id="exp-amount" type="number" min="0" value="${e?e.amount:0}"></div>
        <div class="field"><label>ملاحظة (اختياري)</label><input id="exp-note" value="${e?(e.note||''):''}" placeholder="مثال: شهري"></div>
      </div>
      <div class="modal-foot">
        <button class="btn" onclick="closeModal()">إلغاء</button>
        <button class="btn btn-primary" onclick="saveExpenseForm(${e? `'${e.id}'`:null})">حفظ</button>
      </div>
    </div>
  </div>`;
}

/* ---- new manual order modal (phone) ---- */
function openOrderModal(){
  activeModal = { type:"order", cart:{}, name:"", phone:"" };
  render();
}
function orderModalSetQty(pid, qty){
  qty = Math.max(0, qty);
  if(qty===0) delete activeModal.cart[pid]; else activeModal.cart[pid]=qty;
  render();
}
function saveManualOrder(){
  const name = document.getElementById("order-name").value.trim();
  const phone = document.getElementById("order-phone").value.trim();
  const entries = Object.entries(activeModal.cart);
  if(entries.length===0){ showToast("أضف صنفًا واحدًا على الأقل"); return; }
  const items = entries.map(([pid,qty])=>{
    const p = DATA.products.find(p=>p.id===pid);
    return { productId:pid, qty, priceEach: p.price };
  });
  const total = items.reduce((s,it)=> s+it.qty*it.priceEach, 0);
  const costTotal = costOfOrderItems(items);
  const order = { id: uid("K"), source:"هاتف", customerName:name, phone, items, total, costTotal, status:"received", createdAt: Date.now() };
  DATA.orders.push(order);
  deductForOrder(items);
  activeModal=null; saveData(DATA); showToast("تم تسجيل الطلب ✓");
}

/* ================= MODALS (shared) ================= */
function closeModal(){ activeModal=null; render(); }
function renderModal(){
  if(!activeModal) return "";
  if(activeModal.type==="ingredient") return renderIngredientModal();
  if(activeModal.type==="product") return renderProductModal();
  if(activeModal.type==="order") return renderOrderModal();
  if(activeModal.type==="expense") return renderExpenseModal();
  if(activeModal.type==="units") return renderUnitsModal();
  return "";
}
function renderIngredientModal(){
  const ing = activeModal.id ? DATA.ingredients.find(i=>i.id===activeModal.id) : null;
  const units = DATA.units && DATA.units.length ? DATA.units : ["جم","كيلو","مل","حبة"];
  return `
  <div class="overlay" onclick="if(event.target===this) closeModal()">
    <div class="modal">
      <div class="modal-head"><h3>${ing?"تعديل مكوّن":"إضافة مكوّن جديد"}</h3><button class="close-x" onclick="closeModal()">✕</button></div>
      <div class="modal-body">
        <div class="field"><label>اسم المكوّن</label><input id="ing-name" value="${ing?ing.name:''}" placeholder="مثال: أفوكادو"></div>
        <div class="field-row">
          <div class="field"><label>الوحدة</label>
            <select id="ing-unit">${units.map(u=>`<option ${ing&&ing.unit===u?'selected':''}>${u}</option>`).join("")}</select>
          </div>
          <div class="field"><label>الكمية الحالية</label><input id="ing-qty" type="number" min="0" value="${ing?ing.qty:0}"></div>
        </div>
        <div class="field"><label>تكلفة الوحدة الواحدة (ر.س) — مثال: تكلفة الجرام الواحد</label><input id="ing-cost" type="number" min="0" step="0.001" value="${ing?(ing.costPerUnit||0):0}"></div>
        <button type="button" class="btn btn-sm btn-ghost" style="align-self:flex-start;padding-inline-start:0" onclick="openUnitsModal()">⚙️ إدارة وحدات القياس (إضافة/تعديل/حذف)</button>
      </div>
      <div class="modal-foot">
        <button class="btn" onclick="closeModal()">إلغاء</button>
        <button class="btn btn-primary" onclick="saveIngredientForm(${ing? `'${ing.id}'`:null})">حفظ</button>
      </div>
    </div>
  </div>`;
}
function renderProductModal(){
  const p = activeModal.id ? DATA.products.find(x=>x.id===activeModal.id) : null;
  const recipeRows = activeModal.recipeDraft.map((r,idx)=>`
    <div class="recipe-row">
      <select onchange="updateRecipeRow(${idx},'ingredientId', this.value)">
        ${DATA.ingredients.map(i=>`<option value="${i.id}" ${r.ingredientId===i.id?'selected':''}>${i.name} (${i.unit})</option>`).join("")}
      </select>
      <input type="number" min="0" value="${r.qty}" oninput="updateRecipeRow(${idx},'qty', this.value)">
      <button class="btn btn-sm btn-danger" onclick="removeRecipeRow(${idx})">✕</button>
    </div>`).join("");
  const initCost = computeRecipeCost(activeModal.recipeDraft);
  const initPrice = p ? p.price : 0;
  const initProfit = initPrice - initCost;
  const initMargin = initPrice>0 ? (initProfit/initPrice*100) : 0;
  return `
  <div class="overlay" onclick="if(event.target===this) closeModal()">
    <div class="modal">
      <div class="modal-head"><h3>${p?"تعديل صنف":"إضافة صنف جديد"}</h3><button class="close-x" onclick="closeModal()">✕</button></div>
      <div class="modal-body">
        <div class="field"><label>اسم الصنف</label><input id="prod-name" value="${p?p.nameAr:''}" placeholder="مثال: سوشي كيك"></div>
        <div class="field-row">
          <div class="field"><label>الحجم / الوصف</label><input id="prod-size" value="${p?p.size:''}" placeholder="مثال: 4 انش"></div>
          <div class="field"><label>النوع (البروتين)</label><input id="prod-protein" value="${p?p.protein:''}" placeholder="مثال: شريمب"></div>
        </div>
        <div class="field"><label>السعر (ر.س)</label><input id="prod-price" type="number" min="0" value="${p?p.price:0}" oninput="refreshProductPreview()"></div>
        <div class="field">
          <label>الوصفة (المكوّنات المستخدمة لكل طبق)</label>
          <div style="display:flex;flex-direction:column;gap:8px">${recipeRows || '<div style="font-size:12.5px;color:var(--ink-soft)">لا توجد مكوّنات مضافة بعد</div>'}</div>
          <button class="btn btn-sm" style="margin-top:8px" onclick="addRecipeRow()">+ إضافة مكوّن للوصفة</button>
        </div>
        <div class="card" style="padding:12px 14px;display:flex;justify-content:space-between;gap:10px;flex-wrap:wrap;background:rgba(62,74,50,.06)">
          <div style="font-size:13px">التكلفة: <b id="prod-cost-preview" style="color:var(--green-dark)">${initCost.toFixed(2)} ر.س</b></div>
          <div style="font-size:13px">الربح المتوقع: <b id="prod-profit-preview" style="color:${initProfit<0?'var(--danger)':'var(--ok)'}">${initProfit.toFixed(2)} ر.س</b></div>
          <div style="font-size:13px">هامش الربح: <b id="prod-margin-preview" style="color:var(--green-dark)">${initMargin.toFixed(0)}%</b></div>
        </div>
      </div>
      <div class="modal-foot">
        <button class="btn" onclick="closeModal()">إلغاء</button>
        <button class="btn btn-primary" onclick="saveProductForm(${p? `'${p.id}'`:null})">حفظ الصنف</button>
      </div>
    </div>
  </div>`;
}
function renderOrderModal(){
  const rows = DATA.products.map(p=>{
    const qty = activeModal.cart[p.id]||0;
    return `
      <div class="add-row" style="padding:8px 0;border-bottom:1px dashed var(--line)">
        <div>
          <div style="font-weight:700;font-size:14px">${p.nameAr} <span style="color:var(--ink-soft);font-size:12px">(${p.size} - ${p.protein})</span></div>
          <div style="font-size:12px;color:var(--rose-2)">${p.price} ر.س</div>
        </div>
        <div class="stepper">
          <button onclick="orderModalSetQty('${p.id}', ${qty-1})">−</button>
          <span>${qty}</span>
          <button onclick="orderModalSetQty('${p.id}', ${qty+1})">+</button>
        </div>
      </div>`;
  }).join("");
  const total = Object.entries(activeModal.cart).reduce((s,[pid,qty])=>{
    const p = DATA.products.find(p=>p.id===pid); return s + (p?p.price*qty:0);
  },0);
  return `
  <div class="overlay" onclick="if(event.target===this) closeModal()">
    <div class="modal">
      <div class="modal-head"><h3>تسجيل طلب هاتفي</h3><button class="close-x" onclick="closeModal()">✕</button></div>
      <div class="modal-body">
        <div class="field-row">
          <div class="field"><label>اسم العميل</label><input id="order-name" placeholder="اختياري"></div>
          <div class="field"><label>رقم الجوال</label><input id="order-phone" placeholder="05xxxxxxxx"></div>
        </div>
        <div class="field"><label>الأصناف</label>${rows}</div>
        <div class="order-total"><span>الإجمالي</span><span>${total} ر.س</span></div>
      </div>
      <div class="modal-foot">
        <button class="btn" onclick="closeModal()">إلغاء</button>
        <button class="btn btn-primary" onclick="saveManualOrder()">حفظ الطلب</button>
      </div>
    </div>
  </div>`;
}

/* ================= CUSTOMER PAGE ================= */
function renderCustomerPage(){
  const myOrderId = localStorage.getItem(CUSTOMER_ORDER_KEY);
  const myOrder = myOrderId ? DATA.orders.find(o=>o.id===myOrderId) : null;

  const header = `
    <div class="hero">
      <img class="hero-badge" src="${LOGO}" alt="Kiko Sushi">
      <h1 class="brand-font">Kiko <span style="color:var(--rose-2)">Sushi</span></h1>
      <div class="jp">きこ 寿司</div>
      <div class="tag">طازج · لذيذ · مصنوع بحب</div>
    </div>`;

  if(myOrder){
    return `<main style="max-width:640px">${header}${renderTrackView(myOrder)}</main>`;
  }
  return `<main style="max-width:900px">${header}${renderOrderForm()}</main>`;
}

function renderOrderForm(){
  // group products by name for nicer browsing
  const groups = {};
  DATA.products.forEach(p=>{
    groups[p.nameAr] = groups[p.nameAr] || [];
    groups[p.nameAr].push(p);
  });
  const groupCards = Object.entries(groups).map(([name, variants])=>{
    // pick currently selected variant (default first)
    const selKey = "sel_"+name;
    if(!customerCart._selection) customerCart._selection = {};
    const selectedId = customerCart._selection[name] || variants[0].id;
    const selected = variants.find(v=>v.id===selectedId) || variants[0];
    const avail = availableCount(selected);
    const qty = customerCart[selected.id] || 0;
    const sizes = [...new Set(variants.map(v=>v.size))];
    const proteinsForSize = variants.filter(v=>v.size===selected.size);
    return `
      <div class="menu-item card">
        <div class="name">${name}</div>
        ${sizes.length>1 ? `
        <div class="seg">
          ${sizes.map(sz=>{
            const variant = variants.find(v=>v.size===sz);
            return `<button class="${selected.size===sz?'active':''}" onclick="pickVariant('${name}','${variant.id}')">${sz}</button>`;
          }).join("")}
        </div>` : ""}
        ${proteinsForSize.length>1 ? `
        <div class="seg">
          ${proteinsForSize.map(v=>`<button class="${selected.id===v.id?'active':''}" onclick="pickVariantExact('${name}','${v.id}')">${v.protein}</button>`).join("")}
        </div>` : ""}
        <div class="price-row">
          <div class="price">${selected.price} <span style="font-size:12px">ر.س</span></div>
          <div style="font-size:11.5px;color:${avail===0?'var(--danger)':'var(--ink-soft)'}">${avail===null?'':'متاح: '+avail}</div>
        </div>
        <div class="add-row">
          <div class="stepper">
            <button onclick="setCartQty('${selected.id}', ${qty-1})">−</button>
            <span>${qty}</span>
            <button onclick="setCartQty('${selected.id}', ${qty+1})" ${avail===0?'disabled':''}>+</button>
          </div>
        </div>
      </div>`;
  }).join("");

  const cartEntries = Object.entries(customerCart).filter(([k,v])=> k!=='_selection' && v>0);
  const total = cartEntries.reduce((s,[pid,qty])=>{ const p=DATA.products.find(p=>p.id===pid); return s+(p?p.price*qty:0); },0);
  const count = cartEntries.reduce((s,[,q])=>s+q,0);

  return `
    <div class="grid grid-3">${groupCards}</div>
    ${count>0 ? `
    <div class="cart-bar">
      <div class="card">
        <div class="sum">عدد الأطباق: ${count} — الإجمالي <b>${total} ر.س</b></div>
        <button class="btn btn-rose" onclick="openCustomerCheckout()">متابعة الطلب ←</button>
      </div>
    </div>` : `<div class="footer-note">اختر أطباقك ثم أكمل الطلب من هنا</div>`}
    ${activeCheckout ? renderCheckoutModal(total) : ""}
  
  `;
}
function pickVariant(name, variantId){ customerCart._selection = customerCart._selection||{}; customerCart._selection[name] = variantId; render(); }
function pickVariantExact(name, variantId){ customerCart._selection = customerCart._selection||{}; customerCart._selection[name] = variantId; render(); }
function setCartQty(pid, qty){
  const avail = availableCount(DATA.products.find(p=>p.id===pid));
  qty = Math.max(0, qty);
  if(avail!==null) qty = Math.min(qty, avail);
  if(qty===0) delete customerCart[pid]; else customerCart[pid]=qty;
  render();
}

let activeCheckout = false;
function openCustomerCheckout(){ activeCheckout = true; render(); }
function closeCustomerCheckout(){ activeCheckout = false; render(); }
function renderCheckoutModal(total){
  return `
  <div class="overlay" onclick="if(event.target===this) closeCustomerCheckout()">
    <div class="modal">
      <div class="modal-head"><h3>إتمام الطلب</h3><button class="close-x" onclick="closeCustomerCheckout()">✕</button></div>
      <div class="modal-body">
        <div class="field"><label>الاسم</label><input id="cust-name" placeholder="اسمك"></div>
        <div class="field"><label>رقم الجوال</label><input id="cust-phone" placeholder="05xxxxxxxx"></div>
        <div class="order-total"><span>الإجمالي</span><span>${total} ر.س</span></div>
      </div>
      <div class="modal-foot">
        <button class="btn" onclick="closeCustomerCheckout()">رجوع</button>
        <button class="btn btn-primary" onclick="submitCustomerOrder()">إرسال الطلب</button>
      </div>
    </div>
  </div>`;
}
function submitCustomerOrder(){
  const name = document.getElementById("cust-name").value.trim();
  const phone = document.getElementById("cust-phone").value.trim();
  if(!phone){ showToast("اكتب رقم الجوال"); return; }
  const entries = Object.entries(customerCart).filter(([k,v])=> k!=='_selection' && v>0);
  if(entries.length===0){ showToast("السلة فارغة"); return; }
  const items = entries.map(([pid,qty])=>{
    const p = DATA.products.find(p=>p.id===pid);
    return { productId:pid, qty, priceEach:p.price };
  });
  const total = items.reduce((s,it)=>s+it.qty*it.priceEach,0);
  const costTotal = costOfOrderItems(items);
  const order = { id: uid("K"), source:"رابط", customerName:name, phone, items, total, costTotal, status:"received", createdAt: Date.now() };
  DATA.orders.push(order);
  deductForOrder(items);
  localStorage.setItem(CUSTOMER_ORDER_KEY, order.id);
  customerCart = {}; activeCheckout = false;
  saveData(DATA);
  showToast("تم إرسال طلبك ✓");
}

function renderTrackView(o){
  const idx = STATUS_FLOW.indexOf(o.status);
  const stepsHtml = STATUS_FLOW.map((s,i)=>{
    const cls = i<idx? "done" : i===idx? "current" : "";
    return `<div class="step-node ${cls}"><div class="step-circle">${i<idx?'✓':i+1}</div><div class="step-label">${STATUS[s].label}</div></div>` +
           (i<STATUS_FLOW.length-1 ? `<div class="step-connector ${i<idx?'done':''}"></div>` : "");
  }).join("");
  const itemsHtml = o.items.map(it=>{
    const p = DATA.products.find(p=>p.id===it.productId);
    return `<div><span>${p?p.nameAr:'صنف'} (${p?p.size:''} - ${p?p.protein:''}) × ${it.qty}</span><span>${(it.priceEach*it.qty).toFixed(0)} ر.س</span></div>`;
  }).join("");
  return `
    <div class="track">
      <div class="order-num">طلب رقم #${o.id}</div>
      <div class="steps3">${stepsHtml}</div>
      <div class="card order-items" style="text-align:right;max-width:420px;margin:0 auto">
        ${itemsHtml}
        <div class="order-total"><span>الإجمالي</span><span>${o.total} ر.س</span></div>
      </div>
      <div style="margin-top:18px">
        <button class="btn" onclick="newCustomerOrder()">طلب جديد</button>
      </div>
      <div class="footer-note">تتحدث الحالة تلقائيًا — أبقِ الصفحة مفتوحة</div>
    </div>`;
}
function newCustomerOrder(){ localStorage.removeItem(CUSTOMER_ORDER_KEY); render(); }

/* module scripts don't put top-level functions on window automatically —
   expose everything referenced by onclick/onchange/oninput in the rendered HTML */
Object.assign(window, {
  setAdminTab, copyCustomerLink,
  openIngredientModal, deleteIngredient, saveIngredientForm,
  openUnitsModal, addUnitRow, removeUnitRow, updateUnitRow, saveUnitsForm,
  openProductModal, deleteProduct, addRecipeRow, removeRecipeRow, updateRecipeRow,
  refreshProductPreview, saveProductForm,
  openOrderModal, orderModalSetQty, saveManualOrder, setOrderStatus, deleteOrder,
  openExpenseModal, deleteExpense, saveExpenseForm,
  closeModal,
  pickVariant, pickVariantExact, setCartQty, openCustomerCheckout, closeCustomerCheckout,
  submitCustomerOrder, newCustomerOrder,
});

render();
</script>
</body>
</html>
